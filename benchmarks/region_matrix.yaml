# =============================================================================
# Aurelius Region Matrix
# =============================================================================
#
# Defines all regions, their price data files, and benchmark configurations.
#
# Each region entry:
#   region_id:       canonical region name used in the optimizer
#   market:          ISO/RTO market name
#   price_provider:  CLI --price-provider value
#   da_price_file:   day-ahead price CSV (relative to repo root)
#   rt_price_file:   real-time/settlement price CSV (optional, for DA->RT model)
#   date_range:      available data range [start, end]
#   notes:
#     Data source, coverage, known gaps

regions:
  - region_id: "us-west"
    market: "CAISO"
    price_provider: "csv"
    da_price_file: "data/caiso_us_west_dam.csv"
    rt_price_file: "data/caiso_us_west_rt.csv"
    date_range:
      start: "2026-01-01"
      end: "2026-04-30"
    live_provider: "caiso"
    live_auth_required: false
    notes: >
      CAISO OASIS day-ahead (SP15 hub). Real data, no auth required.
      RT file is also real. Good Q1 2026 coverage.

  - region_id: "us-east"
    market: "PJM"
    price_provider: "csv"
    da_price_file: "data/pjm_us_east_dam.csv"
    rt_price_file: "data/pjm_us_east_rt.csv"
    date_range:
      start: "2026-01-01"
      end: "2026-04-30"
    live_provider: "pjm"
    live_auth_required: true
    live_env_var: "PJM_API_KEY"
    notes: >
      PJM Data Miner day-ahead (COMED hub). Real data.
      Live ingest requires PJM_API_KEY — see API-NEEDED/PJM.md.

  - region_id: "us-south"
    market: "ERCOT"
    price_provider: "csv"
    da_price_file: "data/ercot_us_south_dam.csv"
    rt_price_file: "data/ercot_us_south_rt.csv"
    date_range:
      start: "2026-01-28"
      end: "2026-04-30"
    live_provider: "ercot"
    live_auth_required: true
    live_env_var: "ERCOT_SUBSCRIPTION_KEY"
    notes: >
      ERCOT Houston Hub day-ahead SPP. Real data starting Jan 28 2026.
      Live ingest requires ERCOT_SUBSCRIPTION_KEY and ERCOT_USERNAME.
      See API-NEEDED/ERCOT.md.

# ---------------------------------------------------------------------------
# Multi-region combinations for joint backtest runs
# ---------------------------------------------------------------------------
multi_region_combinations:
  - name: "caiso_pjm"
    regions: ["us-west", "us-east"]
    da_price_file: "data/plan_da_caiso_pjm.csv"
    rt_price_file: "data/settle_rt_caiso_pjm.csv"
    date_range:
      start: "2026-01-15"
      end: "2026-04-30"
    notes: >
      CAISO + PJM combined DA plan / RT settle dataset.
      Use for DA-plan/RT-settle (RT-exposed customer) backtest.
      Anti-correlation between CAISO and PJM price spikes is the
      primary source of multi-region savings.

  - name: "all_us"
    regions: ["us-west", "us-east", "us-south"]
    date_range:
      start: "2026-01-28"
      end: "2026-04-30"
    notes: >
      All three US regions. ERCOT coverage limits start to Jan 28.
      Run individual CSV files per region with --regions flag.

# ---------------------------------------------------------------------------
# Planned regions (data not yet available — see API-NEEDED/)
# ---------------------------------------------------------------------------
planned_regions:
  - region_id: "eu-west"
    market: "ENTSO-E"
    auth_required: true
    env_var: "ENTSOE_API_KEY"
    api_needed_doc: "API-NEEDED/ENTSOE.md"

  - region_id: "us-miso"
    market: "MISO"
    auth_required: false
    notes: "MISO public API — no key required but adapter not yet implemented"

  - region_id: "us-nyiso"
    market: "NYISO"
    auth_required: false
    notes: "NYISO public API — adapter not yet implemented"
